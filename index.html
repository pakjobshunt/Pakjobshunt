<!-- ============================================================
     PakJobsHunt — Blogger-ready version (pure HTML/CSS/JS)
     Paste this ENTIRE block into a Blogger Page/Post HTML view.
     ============================================================ -->
<style>
  #pjh * { box-sizing: border-box; }
  #pjh { font-family: Inter, system-ui, sans-serif; background:#FBFBF8; color:#12261F; }
  #pjh .serif { font-family: Poppins, sans-serif; }
  #pjh .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
  #pjh a { text-decoration:none; }
  #pjh-header { border-bottom:1px solid #EFEFEA; background:#fff; position:sticky; top:0; z-index:40; }
  #pjh-header-inner { max-width:1100px; margin:0 auto; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
  #pjh-logo { display:flex; align-items:center; gap:8px; font-weight:600; font-size:18px; }
  #pjh-logo .box { width:34px; height:34px; border-radius:10px; background:#0B6E4F; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; }
  #pjh-hero { padding:40px 18px 30px; background:linear-gradient(180deg,#EAF4EE 0%, #FBFBF8 100%); }
  #pjh-hero-inner { max-width:1100px; margin:0 auto; }
  #pjh-hero .eyebrow { font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#07523A; }
  #pjh-hero h1 { font-size:32px; margin:8px 0 0; line-height:1.2; }
  #pjh-search { margin-top:22px; background:#fff; border:1px solid #E4E4E0; border-radius:16px; padding:8px; display:flex; flex-wrap:wrap; gap:8px; }
  #pjh-search input[type=text] { flex:1; min-width:180px; border:none; outline:none; padding:10px 12px; font-size:14px; }
  #pjh-search select { border:none; padding:10px 12px; font-size:14px; background:#fff; border-left:1px solid #E4E4E0; }
  #pjh-search button { background:#0B6E4F; color:#fff; border:none; padding:10px 20px; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; }
  #pjh-cats { margin-top:16px; display:flex; flex-wrap:wrap; gap:8px; }
  #pjh-cats button { font-size:12px; padding:6px 12px; border-radius:999px; border:1px solid #E4E4E0; background:#fff; color:#5B6E64; cursor:pointer; font-weight:500; }
  #pjh-cats button.active { background:#0B6E4F; border-color:#0B6E4F; color:#fff; }
  #pjh-list { max-width:1100px; margin:0 auto; padding:28px 18px; }
  #pjh-list-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  #pjh-list-head select { font-size:12px; padding:8px 10px; border-radius:8px; border:1px solid #E4E4E0; background:#fff; color:#5B6E64; }
  #pjh-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; }
  .pjh-card { text-align:left; border:1px solid #E4E4E0; border-radius:16px; padding:18px; background:#fff; cursor:pointer; display:flex; flex-direction:column; gap:10px; }
  .pjh-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.06); }
  .pjh-card-top { display:flex; justify-content:space-between; gap:10px; }
  .pjh-avatar { width:42px; height:42px; border-radius:10px; background:#EAF4EE; color:#07523A; display:flex; align-items:center; justify-content:center; font-weight:600; flex-shrink:0; }
  .pjh-card h3 { margin:0; font-size:15px; }
  .pjh-card .company { margin:2px 0 0; font-size:13px; color:#5B6E64; }
  .pjh-new-badge { font-size:10px; text-transform:uppercase; background:#F4B400; color:#12261F; padding:4px 8px; border-radius:999px; height:fit-content; font-weight:600; }
  .pjh-meta { display:flex; flex-wrap:wrap; gap:10px; font-size:12px; color:#5B6E64; }
  .pjh-card-bottom { display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid #EFEFEA; padding-top:10px; }
  .pjh-posted { font-size:11px; color:#8A9A8F; }
  .pjh-deadline { width:130px; }
  .pjh-deadline .label { font-size:11px; margin-bottom:3px; }
  .pjh-bar { height:6px; border-radius:999px; background:#E4E4E0; }
  .pjh-bar-fill { height:6px; border-radius:999px; }
  .pjh-card-actions { display:flex; gap:8px; margin-top:2px; }
  .pjh-card-actions a, .pjh-card-actions button { flex:1; text-align:center; font-size:13px; font-weight:600; padding:9px 10px; border-radius:10px; border:none; cursor:pointer; }
  .pjh-apply-quick { background:#0B6E4F; color:#fff; }
  .pjh-details-quick { background:#fff; color:#0B6E4F; border:1px solid #0B6E4F !important; }
  #pjh-modal-overlay, #pjh-post-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:999; display:none; align-items:center; justify-content:center; padding:16px; }
  #pjh-modal { background:#fff; width:100%; max-width:560px; border-radius:20px; max-height:90vh; overflow-y:auto; }
  .pjh-modal-header { position:sticky; top:0; background:#fff; display:flex; justify-content:space-between; align-items:center; padding:16px 22px; border-bottom:1px solid #EFEFEA; }
  .pjh-close { border:none; background:none; font-size:20px; cursor:pointer; color:#5B6E64; }
  .pjh-modal-body { padding:20px 22px; display:flex; flex-direction:column; gap:16px; }
  .pjh-deadline-box { border-radius:14px; padding:14px; display:flex; justify-content:space-between; align-items:center; background:#EAF4EE; }
  .pjh-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; font-size:14px; }
  .pjh-detail-grid .lbl { font-size:11px; text-transform:uppercase; color:#8A9A8F; }
  #pjh-apply-btn { flex:1; text-align:center; background:#0B6E4F; color:#fff; padding:13px; border-radius:12px; font-weight:600; font-size:14px; display:block; }
  #pjh-footer { border-top:1px solid #EFEFEA; padding:24px 18px; font-size:12px; color:#8A9A8F; display:flex; justify-content:space-between; max-width:1100px; margin:0 auto; }
  @media (max-width:640px){ #pjh-hero h1{font-size:26px;} .pjh-detail-grid{grid-template-columns:1fr;} }
</style>

<div id="pjh">
  <div id="pjh-header">
    <div id="pjh-header-inner">
      <div id="pjh-logo"><span class="box">💼</span><span class="serif">PakJobs<span style="color:#F4B400">Hunt</span></span></div>
    </div>
  </div>

  <div id="pjh-hero">
    <div id="pjh-hero-inner">
      <p class="eyebrow" id="pjh-count-line"></p>
      <h1 class="serif">Find your next role,<br>before the deadline closes.</h1>
      <div id="pjh-search">
        <input type="text" id="pjh-q" placeholder="Job title, company, or keyword" oninput="pjhRender()">
        <select id="pjh-city" onchange="pjhRender()"><option value="All">All cities</option></select>
        <button onclick="pjhRender()">Search</button>
      </div>
      <div id="pjh-cats"></div>
    </div>
  </div>

  <div id="pjh-list">
    <div id="pjh-list-head">
      <h2 class="serif" id="pjh-result-count" style="font-size:17px;margin:0;"></h2>
      <select id="pjh-sort" onchange="pjhRender()">
        <option value="newest">Newest first</option>
        <option value="closing">Closing soon</option>
      </select>
    </div>
    <div id="pjh-grid"></div>
  </div>

  <div id="pjh-footer">
    <span>© 2026 PakJobsHunt — jobs across Pakistan.</span>
    <span class="mono">Built for job seekers, by job seekers.</span>
  </div>
</div>

<!-- Job detail modal -->
<div id="pjh-modal-overlay" onclick="pjhCloseModal(event)">
  <div id="pjh-modal" onclick="event.stopPropagation()"></div>
</div>

<script>
(function(){
  const CATEGORIES = ["Government","Private","IT","Banking","Education","Medical","Engineering"];
  const CITIES = ["Karachi","Lahore","Islamabad","Rawalpindi","Faisalabad","Multan","Peshawar","Quetta"];
  const TODAY = new Date("2026-07-19");

  let jobs = [
      {
  "id": 108,
  "title": "Injection Molding Supervisor & Operator",
  "company": "Plastic Factory",
  "category": "Manufacturing / Technical",
  "city": "Karachi",
  "type": "Full-time",
  "qualification": "Matric / Intermediate / DAE",
  "experience": "Relevant Experience",
  "salary": "As per company policy",
  "vacancies": 1,
  "published": "2026-07-23",
  "end": "2026-08-08",
  "description": "Injection Molding Supervisor aur Operator ki asami khali hai. Application dene ke liye Diye gaye link par ja kar apply karein.",
  "apply": "https://www.jobz.pk"
}
  
       {id:108,title:"Executive Officer-Procurement",company:"Punjab Safe Cities Authority - PSCA Lahore",category:"Government",city:"Lahore",type:"Full-time",qualification:"Intermediate, Bachelor, Master",experience:"0 years",salary:"PKR 100000 to 323800",vacancies:"Multiple",published:"2026-07-19",end:"2026-07-31",description:"Punjab Safe Cities Authority (PSCA), Lahore invites applications through an open competitive process for the multiple positions  on contract basis. Interested candidates should review the complete eligibility criteria on the official advertisement before applying",apply:"https://psca.gop.pk/career/"},
       {id:1,title:"Assistant Manager – Operations",company:"Metro Bank of Pakistan",category:"Banking",city:"Karachi",type:"Full-time",qualification:"MBA / BBA (16 years education)",experience:"2–4 years",salary:"PKR 90,000 – 120,000",vacancies:3,published:"2026-07-10",end:"2026-08-05",description:"Metro Bank of Pakistan is looking for a detail-oriented Assistant Manager to oversee daily branch operations, ensure compliance with SBP regulations, and lead a small team of tellers and CSOs.",apply:"careers@metrobank.example.com"},
    {id:2,title:"Software Engineer (React / Node.js)",company:"TechNova Solutions",category:"IT",city:"Lahore",type:"Full-time",qualification:"BS Computer Science",experience:"1–3 years",salary:"PKR 120,000 – 180,000",vacancies:5,published:"2026-07-14",end:"2026-07-31",description:"TechNova Solutions is expanding its product engineering team. We're hiring engineers comfortable across the stack, building REST APIs in Node.js and crafting responsive interfaces in React.",apply:"https://technova.example.com/careers"},
    {id:3,title:"Lecturer – Mathematics",company:"Federal Board of Education",category:"Government",city:"Islamabad",type:"Full-time",qualification:"MPhil Mathematics",experience:"3+ years teaching",salary:"As per government scale (BPS-17)",vacancies:8,published:"2026-06-28",end:"2026-07-25",description:"The Federal Board of Education invites applications for the post of Lecturer in Mathematics at government degree colleges. Selection via written test and interview.",apply:"https://fbe.example.gov.pk/jobs"},
    {id:4,title:"Site Civil Engineer",company:"Al-Falah Construction Co.",category:"Engineering",city:"Faisalabad",type:"Contract",qualification:"BSc Civil Engineering, PEC registered",experience:"2+ years",salary:"PKR 100,000 – 140,000",vacancies:2,published:"2026-07-08",end:"2026-07-22",description:"Al-Falah Construction Co. requires a site civil engineer for an ongoing residential housing project, including site supervision and quality control.",apply:"hr@alfalahconstruction.example.com"},
    {id:5,title:"Staff Nurse",company:"Al-Shifa General Hospital",category:"Medical",city:"Rawalpindi",type:"Full-time",qualification:"BSN / Diploma in Nursing",experience:"1+ years",salary:"PKR 60,000 – 80,000",vacancies:10,published:"2026-07-15",end:"2026-08-10",description:"Al-Shifa General Hospital is hiring registered staff nurses for its emergency and general ward departments.",apply:"jobs@alshifahospital.example.com"},
    {id:6,title:"Content Writer (Part-time)",company:"Bright Media Group",category:"Private",city:"Multan",type:"Part-time",qualification:"BA/BS in English, Mass Comm, or related",experience:"Fresh / 1 year",salary:"PKR 35,000 – 50,000",vacancies:2,published:"2026-07-16",end:"2026-07-29",description:"Bright Media Group needs a part-time content writer to produce Urdu and English articles for its digital news platforms.",apply:"https://brightmedia.example.com/careers"}
  ];

  let state = { q:"", city:"All", category:"All", sort:"newest" };

  function daysLeft(end){ return Math.ceil((new Date(end)-TODAY)/86400000); }
  function fmt(d){ return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

  function init(){
    const catWrap = document.getElementById('pjh-cats');
    ["All",...CATEGORIES].forEach(c=>{
      const b=document.createElement('button');
      b.textContent=c; b.dataset.cat=c;
      b.onclick=()=>{state.category=c; pjhRender();};
      catWrap.appendChild(b);
    });
    const citySel = document.getElementById('pjh-city');
    CITIES.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; citySel.appendChild(o); });

    render();
  }

  function render(){
    document.getElementById('pjh-count-line').textContent = jobs.length + " live openings across Pakistan";
    document.querySelectorAll('#pjh-cats button').forEach(b=>{
      b.classList.toggle('active', b.dataset.cat===state.category);
    });

    let list = jobs.filter(j=>{
      const q = document.getElementById('pjh-q').value.toLowerCase();
      state.q=q; state.city=document.getElementById('pjh-city').value; state.sort=document.getElementById('pjh-sort').value;
      const mQ = !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.city.toLowerCase().includes(q);
      const mCity = state.city==="All" || j.city===state.city;
      const mCat = state.category==="All" || j.category===state.category;
      return mQ && mCity && mCat;
    });
    list.sort((a,b)=> state.sort==="newest" ? new Date(b.published)-new Date(a.published) : daysLeft(a.end)-daysLeft(b.end));

    document.getElementById('pjh-result-count').textContent = list.length + " job" + (list.length!==1?'s':'') + " found";
    const grid = document.getElementById('pjh-grid');
    grid.innerHTML = "";
    if(list.length===0){
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#8A9A8F;padding:40px 0;">No jobs match your search.</p>';
      return;
    }
    list.forEach(j=>{
      const left = daysLeft(j.end);
      const expired = left<0, urgent = left>=0 && left<=5;
      const pct = expired?100:Math.max(4,100-Math.min(left,20)*5);
      const isNew = (TODAY-new Date(j.published))/86400000 <= 4;
      const card = document.createElement('div');
      card.className='pjh-card';
      card.onclick=()=>pjhOpenModal(j.id);
      card.innerHTML = `
        <div class="pjh-card-top">
          <div style="display:flex;gap:10px;">
            <div class="pjh-avatar">${j.company.charAt(0)}</div>
            <div><h3>${j.title}</h3><p class="company">${j.company}</p></div>
          </div>
          ${isNew?'<span class="pjh-new-badge">New</span>':''}
        </div>
        <div class="pjh-meta">
          <span>📍 ${j.city}</span><span>💼 ${j.type}</span><span>🎓 ${j.qualification.split('(')[0].trim()}</span>
        </div>
        <div class="pjh-card-bottom">
          <span class="pjh-posted mono">Posted ${fmt(j.published)}</span>
          <div class="pjh-deadline">
            <div class="label mono" style="color:${expired||urgent?'#B3261E':'#07523A'}">${expired?'Expired':left+'d left'}</div>
            <div class="pjh-bar"><div class="pjh-bar-fill" style="width:${pct}%;background:${expired||urgent?'#B3261E':'#F4B400'}"></div></div>
          </div>
        </div>
        <div class="pjh-card-actions">
          <button class="pjh-details-quick" onclick="event.stopPropagation(); pjhOpenModal(${j.id});">View details</button>
          <a class="pjh-apply-quick" href="${j.apply && j.apply.startsWith('http') ? j.apply : 'mailto:' + (j.apply||'')}" target="_blank" onclick="event.stopPropagation();">Apply</a>
        </div>`;
      grid.appendChild(card);
    });
  }

  window.pjhRender = render;

  window.pjhOpenModal = function(id){
    const j = jobs.find(x=>x.id===id);
    const left = daysLeft(j.end);
    const modal = document.getElementById('pjh-modal');
    modal.innerHTML = `
      <div class="pjh-modal-header">
        <span class="mono" style="font-size:11px;text-transform:uppercase;color:#0B6E4F;">${j.category}</span>
        <button class="pjh-close" onclick="pjhCloseModal()">✕</button>
      </div>
      <div class="pjh-modal-body">
        <div>
          <h2 class="serif" style="margin:0;font-size:22px;">${j.title}</h2>
          <p style="margin:4px 0 0;color:#5B6E64;font-size:14px;">🏢 ${j.company}</p>
        </div>
        <div class="pjh-deadline-box" style="background:${left<0?'#FCEBEA':'#EAF4EE'}">
          <div><p class="lbl">Application deadline</p><p style="font-weight:600;color:${left<0?'#B3261E':'#07523A'}">${fmt(j.end)}</p></div>
          <span class="mono" style="padding:6px 12px;border-radius:999px;background:${left<0?'#B3261E':'#F4B400'};color:${left<0?'#fff':'#12261F'};font-size:13px;">${left<0?'Closed':left+' days left'}</span>
        </div>
        <div class="pjh-detail-grid">
          <div><p class="lbl">Location</p>${j.city}</div>
          <div><p class="lbl">Job type</p>${j.type}</div>
          <div><p class="lbl">Qualification</p>${j.qualification}</div>
          <div><p class="lbl">Experience</p>${j.experience}</div>
          <div><p class="lbl">Salary</p>${j.salary||'Not specified'}</div>
          <div><p class="lbl">Vacancies</p>${j.vacancies}</div>
          <div><p class="lbl">Published</p>${fmt(j.published)}</div>
        </div>
        <div><p class="lbl" style="margin-bottom:6px;">Job description</p><p style="font-size:14px;line-height:1.6;">${j.description}</p></div>
        <a id="pjh-apply-btn" href="${j.apply.startsWith('http')?j.apply:'mailto:'+j.apply}" target="_blank">Apply now</a>
      </div>`;
    document.getElementById('pjh-modal-overlay').style.display='flex';
  };
  window.pjhCloseModal = function(e){ if(!e || e.target.id==='pjh-modal-overlay') document.getElementById('pjh-modal-overlay').style.display='none'; };

  init();
})();
</script>
